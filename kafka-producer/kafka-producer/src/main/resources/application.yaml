spring:
  application:
    name: kafka-producer

server:
  port: 8083

kafka:
  brokerAddress: localhost:9092,localhost:9094,localhost:9096
  schemaRegistryAddress: http://localhost:8081
  topics:
    user:
      name: user-topic
      changelog:
        name: user-changelog-topic
    company:
      name: company-topic
      changelog:
        name: company-changelog-topic
      global:
        name: global-company-topic
    message:
      name: message-topic
    temp:
      name: temperature-sensor